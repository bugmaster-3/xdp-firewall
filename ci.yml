name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (kernel ${{ matrix.kernel }})
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        kernel: ["5.15", "6.1", "6.8"]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang llvm \
            libbpf-dev \
            libelf-dev \
            linux-headers-$(uname -r) \
            gcc make

      - name: Build BPF object + userspace binary
        run: make

      - name: Verify BPF program (bpftool)
        run: |
          sudo apt-get install -y linux-tools-$(uname -r) || true
          bpftool prog load build/xdp_firewall.o /sys/fs/bpf/xdp_fw_test 2>&1 || \
            echo "bpftool load not available in CI — skipping live verify"
          rm -f /sys/fs/bpf/xdp_fw_test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xdp-firewall-${{ matrix.kernel }}
          path: |
            build/xdp_firewall.o
            build/xdp_firewall

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          clang-format --dry-run --Werror src/*.c include/*.h
